name: Deploy Astro to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Contrast audit
        run: npm run audit:contrast

      - name: Alt text check
        run: npm run check:alt

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --remap "https://tazzledazzle.github.io file://${{ github.workspace }}/dist" dist

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Accessibility tests (axe)
        run: npm run test:a11y

      - name: Lighthouse CI
        run: npm run check:lighthouse

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
